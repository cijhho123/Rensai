mainSections = ["post"]
rssFullContent = true
SortBy = "default"

[footer]
    since = 2026
    customText = ""

[dateFormat]
    published = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji = ""
    subtitle = "Daily anime, manga, and otaku culture articles"
    avatar = ""

[article]
    headingAnchor = false
    math = false
    readingTime = true

    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 30 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle = true
    default = "auto"

[comments]
    enabled = false
    provider = ""
